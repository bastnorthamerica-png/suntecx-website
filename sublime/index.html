    <script>
        function getVisitSourceData() {
            const SESSION_KEY = "visit_session_data", LOCK_KEY = "paid_source_lock", LOCK_DAYS = 30;
            const CAT = { DIRECT: "A", ORGANIC: "B", PAID: "C", SOCIAL: "D" };

            const SOCIAL_DOMAINS = [
                "sublime_instagram", "sublime_linkedin", "xiaohongshu", "instagram", "pinterest",
                "snapchat", "telegram", "facebook", "linkedin", "whatsapp", "youtube", "twitter",
                "tiktok", "reddit", "lnkd.in", "wechat", "douyin", "weibo", "zhihu", "line", "t.co", "x",
            ];
            const SEARCH_ENGINES = [
                { key: "google", pattern: /google\.|^com\.google\./ },
                { key: "baidu", pattern: /baidu\./ }, { key: "bing", pattern: /bing\./ },
                { key: "yahoo", pattern: /yahoo\./ }, { key: "sogou", pattern: /sogou\./ },
                { key: "so.com", pattern: /(?:^|\.)so\.com(?:$|\.)/ },
                { key: "duckduckgo", pattern: /duckduckgo\./ },
                { key: "yandex", pattern: /yandex\./ },
                { key: "sm.cn", pattern: /(?:^|\.)sm\.cn(?:$|\.)/ },
                { key: "naver", pattern: /naver\./ },
            ];
            const GOOGLE_AD_DOMAINS = [
                "googleadservices", "googlesyndication", "doubleclick", "googleads",
                "2mdn.net", "googletagservices", "adtrafficquality.google", "tpc.googlesyndication.com",
            ];
            const FB_AD_DOMAINS = ["l.facebook.com", "lm.facebook.com", "business.facebook.com"];
            const BING_AD_DOMAINS = ["r.bing.com", "bat.bing.com", "ads.microsoft.com", "bingads.microsoft.com"];
            const MS_AD_NET_DOMAINS = ["msn.com", "outlook.com", "outlook.live.com", "aol.com", "search.aol.com"];
            const MS_AD_PATHS = ["/aclick", "/adclick", "/aclk"];
            const SRC_NORM = {
                microsoft: "bing", microsoftads: "bing", microsoft_ads: "bing",
                msn: "bing", msnads: "bing", bing_ads: "bing", bingads: "bing",
            };
            const PAID_MEDIUMS = ["cpc", "ppc", "paidsearch", "display", "cpm", "ad", "ads", "affiliate"];

            const norm = (s) => SRC_NORM[s] || s;
            const sMap = {
                session: typeof sessionStorage !== "undefined" ? sessionStorage : null,
                local: typeof localStorage !== "undefined" ? localStorage : null,
            };
            const ss = {
                get(t, k) { try { return sMap[t]?.getItem(k) ?? null; } catch (_) { return null; } },
                set(t, k, v) { try { sMap[t]?.setItem(k, v); } catch (_) { } },
                rm(t, k) { try { sMap[t]?.removeItem(k); } catch (_) { } },
            };

            const _sp = new URLSearchParams(window.location.search);
            const _hp = window.location.hash.includes("?")
                ? new URLSearchParams(window.location.hash.split("?")[1]) : null;
            const gp = (n) => _sp.has(n) ? _sp.get(n) : (_hp?.has(n) ? _hp.get(n) : "");

            function getRootDomain(hostname) {
                const h = hostname.toLowerCase();
                if (/^\d+\.\d+\.\d+\.\d+$/.test(h)) return h;
                const p = h.split(".");
                if (p.length <= 2) return h;
                const sld = ["co", "com", "org", "net", "gov", "edu", "ac", "or", "ne", "go", "me", "io"];
                return (p.length >= 3 && sld.includes(p[p.length - 2])) ? p.slice(-3).join(".") : p.slice(-2).join(".");
            }

            function br(cat, src, med, gclid) {
                return { visit_category: cat, visit_source: src, visit_medium: med, gclid: gclid || "", timestamp: now };
            }

            function cachePaid(src, med) {
                const r = br(CAT.PAID, src, med);
                ss.set("local", LOCK_KEY, JSON.stringify(r));
                ss.set("session", SESSION_KEY, JSON.stringify(r));
                return r;
            }

            const now = Date.now();
            const cid = {
                gclid: gp("gclid"), gadSrc: gp("gad_source"), fbclid: gp("fbclid"), msclkid: gp("msclkid"),
                ttclid: gp("ttclid"), dclid: gp("dclid"), wbraid: gp("wbraid"), gbraid: gp("gbraid"),
                gclsrc: gp("gclsrc"),
            };
            const hasCid = Object.values(cid).some(Boolean);
            const utmSrc = (gp("utm_source") || "").toLowerCase();
            const utmMed = (gp("utm_medium") || "").toLowerCase();
            const utmCmp = (gp("utm_campaign") || "").toLowerCase();
            const isPaid = PAID_MEDIUMS.includes(utmMed) || /(?:^|[_\-])cpc(?:$|[_\-])/i.test(utmCmp);

            function detectPaid() {
                if (!hasCid && !isPaid) return null;
                let src = "unknown_ad", med = "cpc";
                const pm = (isPaid && utmMed) ? utmMed : "cpc";
                if (cid.dclid) { src = "google"; med = "display"; }
                else if (cid.gclid || cid.wbraid || cid.gbraid || cid.gadSrc || cid.gclsrc) { src = "google"; med = pm; }
                else if (cid.fbclid) { src = "facebook"; med = pm; }
                else if (cid.msclkid) { src = "bing"; med = pm; }
                else if (cid.ttclid) { src = "tiktok"; med = pm; }
                else if (utmSrc) { src = norm(utmSrc); med = utmMed || "cpc"; }
                const r = br(CAT.PAID, src, med, cid.gclid);
                ss.set("local", LOCK_KEY, JSON.stringify(r));
                ss.set("session", SESSION_KEY, JSON.stringify(r));
                return r;
            }

            function checkLock() {
                const raw = ss.get("local", LOCK_KEY);
                if (!raw) return null;
                try {
                    const d = JSON.parse(raw), exp = LOCK_DAYS * 86400000;
                    if (d?.timestamp) {
                        if (now - d.timestamp < exp) return br(d.visit_category, d.visit_source, d.visit_medium, d.gclid);
                        ss.rm("local", LOCK_KEY);
                    }
                } catch (_) { ss.rm("local", LOCK_KEY); }
                return null;
            }

            function analyzeRef() {
                const url = new URL(../index.html);
                const h = url.hostname.toLowerCase(), p = url.pathname, ch = window.location.hostname.toLowerCase();
                if (getRootDomain(h) === getRootDomain(ch)) return { category: CAT.DIRECT, source: "direct", medium: "none" };
                const fp = h + p;

                if (GOOGLE_AD_DOMAINS.some((d) => h.includes(d))) return cachePaid("google", "cpc");
                const isG = /^google\.|^com\.google\.|^www\.google\./.test(h) || h.includes(".google.");
                if (isG && (p.includes("/aclk") || p.includes("/pagead"))) return cachePaid("google", "cpc");
                if (FB_AD_DOMAINS.some((d) => h === d || h.endsWith("." + d))) return cachePaid("facebook", "paid_social");
                if (BING_AD_DOMAINS.some((d) => fp.includes(d))) return cachePaid("bing", "cpc");
                if (/^(www\.)?bing\./.test(h) && MS_AD_PATHS.some((x) => p.includes(x))) return cachePaid("bing", "cpc");
                if (MS_AD_NET_DOMAINS.some((d) => h.includes(d)) && MS_AD_PATHS.some((x) => p.includes(x))) return cachePaid("bing", "cpc");

                const eng = SEARCH_ENGINES.find((e) => e.pattern.test(h) || (url.protocol === "android-app:" && h.includes("google")));
                if (eng) return { category: CAT.ORGANIC, source: eng.key, medium: "organic" };

                const soc = SOCIAL_DOMAINS.find((s) => {
                    if (s === "x") return h === "x.com" || h === "www.x.com";
                    if (s === "line") return h === "line.me" || h.endsWith(".line.me");
                    return h.includes(s);
                });
                if (soc) return { category: CAT.SOCIAL, source: soc, medium: "social" };
                return { category: CAT.DIRECT, source: h, medium: "referral" };
            }

            function detectOrganic() {
                const cached = ss.get("session", SESSION_KEY);
                if (cached) { try { return JSON.parse(cached); } catch (_) { } }
                let cat = CAT.DIRECT, src = "direct", med = "none";
                if (utmSrc || utmMed) {
                    src = norm(utmSrc) || "unknown";
                    const isSoc = utmMed === "social" || SOCIAL_DOMAINS.some((s) => {
                        if (s === "x") return utmSrc === "x" || utmSrc === "x.com";
                        if (s === "line") return utmSrc === "line" || utmSrc === "../index.html";
                        return utmSrc.includes(s);
                    });
                    cat = isSoc ? CAT.SOCIAL : CAT.DIRECT;
                    med = utmMed || (isSoc ? "social" : "referral");
                } else if (document.referrer) {
                    try {
                        const ref = analyzeRef();
                        if (ref.timestamp) return ref;
                        ({ category: cat, source: src, medium: med } = ref);
                    } catch (_) { }
                }
                const r = br(cat, src, med);
                ss.set("session", SESSION_KEY, JSON.stringify(r));
                return r;
            }

            return detectPaid() || checkLock() || detectOrganic();
        }    

        getVisitSourceData();
    </script>
